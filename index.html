<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Web Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              border: 'hsl(var(--border))',
              input: 'hsl(var(--input))',
              ring: 'hsl(var(--ring))',
              background: 'hsl(var(--background))',
              foreground: 'hsl(var(--foreground))',
              primary: {
                DEFAULT: '#4f46e5',
                foreground: '#ffffff'
              }
            }
          }
        }
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html {
        font-size: 16px;
      }
      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --border: 214.3 31.8% 91.4%;
        --input: 214.3 31.8% 91.4%;
        --ring: 221.2 83.2% 53.3%;
        --radius-card: 1rem;
        --radius-panel: 0.75rem;
        --radius-control: 0.5rem;
        --font-page-title-size: 1.875rem;
        --font-page-title-weight: 800;
        --font-page-subtitle-size: 0.9375rem;
        --font-page-subtitle-weight: 500;
        --font-section-title-size: 0.75rem;
        --font-section-title-weight: 800;
        --font-table-head-size: 0.625rem;
        --font-table-head-weight: 800;
        --font-table-cell-size: 0.8125rem;
      }
      .dark {
        --background: 222.2 84% 4.9%;
        --foreground: 210 40% 98%;
        --border: 217.2 32.6% 17.5%;
        --input: 217.2 32.6% 17.5%;
        --ring: 224.3 76.3% 48%;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        font-size: 0.875rem; /* 14px base */
        line-height: 1.25rem;
      }

      .ui-page-title {
        font-size: var(--font-page-title-size);
        line-height: 1.1;
        font-weight: var(--font-page-title-weight);
        letter-spacing: -0.02em;
        color: #0f172a;
      }
      .dark .ui-page-title {
        color: #f8fafc;
      }
      .ui-page-subtitle {
        font-size: var(--font-page-subtitle-size);
        line-height: 1.35;
        font-weight: var(--font-page-subtitle-weight);
        color: #64748b;
      }
      .dark .ui-page-subtitle {
        color: #94a3b8;
      }
      .ui-section-title {
        font-size: var(--font-section-title-size);
        font-weight: var(--font-section-title-weight);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #64748b;
      }
      .dark .ui-section-title {
        color: #94a3b8;
      }
      .ui-subheader {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
      }
      .dark .ui-subheader {
        color: #94a3b8;
      }
      .ui-table-head {
        font-size: var(--font-table-head-size);
        font-weight: var(--font-table-head-weight);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
      }
      .dark .ui-table-head {
        color: #94a3b8;
      }
      .ui-table-cell {
        font-size: var(--font-table-cell-size);
        color: #334155;
      }
      .dark .ui-table-cell {
        color: #cbd5e1;
      }
      .ui-table-cell-muted {
        font-size: var(--font-table-cell-size);
        color: #64748b;
      }
      .dark .ui-table-cell-muted {
        color: #94a3b8;
      }
      .ui-form-label {
        font-size: 0.75rem;
        line-height: 1.1;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #64748b;
      }
      .dark .ui-form-label {
        color: #94a3b8;
      }
      .ui-form-helper {
        font-size: 0.6875rem;
        line-height: 1.25;
        color: #64748b;
      }
      .dark .ui-form-helper {
        color: #94a3b8;
      }
      .ui-form-error {
        font-size: 0.6875rem;
        line-height: 1.25;
        font-weight: 600;
        color: #dc2626;
      }
      .dark .ui-form-error {
        color: #fca5a5;
      }
      .ui-kicker {
        font-size: 0.6875rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .ui-micro-text {
        font-size: 0.6875rem;
        line-height: 1.25;
      }
      .ui-table-standard tbody td {
        font-size: var(--font-table-cell-size);
        line-height: 1.35;
        color: #334155;
      }
      .dark .ui-table-standard tbody td {
        color: #cbd5e1;
      }
      .shadcn-input {
        display: flex;
        height: 2.25rem;
        width: 100%;
        border-radius: var(--radius-control);
        border: 1px solid hsl(var(--border));
        background-color: transparent;
        padding: 0 0.75rem;
        font-size: 0.875rem;
        transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
      }
      .shadcn-input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
      }
      .dark .shadcn-input {
        background-color: #0f172a;
      }

      /* Modern Table Styles */
      .modern-table {
        width: 100%;
        border-collapse: collapse;
      }
      .modern-table thead tr {
        background-color: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
      }
      .dark .modern-table thead tr {
        background-color: #0f172a;
        border-bottom-color: #1e293b;
      }
      .modern-table th {
        font-size: 0.75rem;
        font-weight: 600;
        color: #334155;
        text-transform: uppercase;
        letter-spacing: 0.025em;
        padding: 0.75rem 1rem;
        text-align: left;
        white-space: nowrap;
      }
      .dark .modern-table th {
        color: #cbd5e1;
      }
      .modern-table td {
        font-size: 0.875rem;
        color: #0f172a;
        padding: 0.625rem 1rem;
        border-bottom: 1px solid #f1f5f9;
        transition: background-color 150ms cubic-bezier(0.4, 0, 0.2, 1);
      }
      .dark .modern-table td {
        color: #f1f5f9;
        border-bottom-color: #1e293b;
      }
      .modern-table tr:hover td {
        background-color: rgba(248, 250, 252, 0.5);
      }
      .dark .modern-table tr:hover td {
        background-color: rgba(30, 41, 59, 0.5);
      }

      /* Compact mode for complex tables */
      .modern-table-compact th {
        padding: 0.5rem 0.75rem;
        font-size: 0.6875rem;
      }
      .modern-table-compact td {
        padding: 0.375rem 0.75rem;
        font-size: 0.75rem;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #1e293b;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 500;
        min-width: 80px;
        justify-content: center;
      }

      /* Shared UI radius standards */
      .ui-radius-card {
        border-radius: var(--radius-card) !important;
      }
      .ui-radius-panel {
        border-radius: var(--radius-panel) !important;
      }
      .ui-radius-control {
        border-radius: var(--radius-control) !important;
      }

      /* React Select dark mode support */
      .company-scope__control,
      .shipto-access__control,
      .shipto-multi__control {
        background-color: #ffffff !important;
        border-color: hsl(var(--border)) !important;
        border-radius: var(--radius-control) !important;
        min-height: 2.25rem !important;
        box-shadow: none !important;
      }
      .company-scope__control--is-multi,
      .shipto-access__control--is-multi,
      .shipto-multi__control--is-multi {
        min-height: 2.25rem !important;
        height: auto !important;
      }
      .company-scope__value-container,
      .shipto-access__value-container,
      .shipto-multi__value-container {
        padding: 0 0.75rem !important;
        gap: 0.25rem !important;
      }
      .company-scope__input-container,
      .shipto-access__input-container,
      .shipto-multi__input-container {
        margin: 0 !important;
        padding: 0 !important;
      }
      .company-scope__indicators,
      .shipto-access__indicators,
      .shipto-multi__indicators {
        height: 2.25rem !important;
      }
      .company-scope__indicator,
      .shipto-access__indicator,
      .shipto-multi__indicator {
        padding: 0.375rem !important;
      }
      .company-scope__control--is-focused,
      .shipto-access__control--is-focused,
      .shipto-multi__control--is-focused {
        border-color: #6366f1 !important;
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1) !important;
      }
      .company-scope__menu,
      .shipto-access__menu,
      .shipto-multi__menu {
        border: 1px solid hsl(var(--border)) !important;
        overflow: hidden !important;
        border-radius: var(--radius-control) !important;
        z-index: 30 !important;
      }
      .company-scope__menu-list,
      .shipto-access__menu-list,
      .shipto-multi__menu-list {
        padding: 0.25rem !important;
      }
      .company-scope__option,
      .shipto-access__option,
      .shipto-multi__option {
        font-size: 0.8125rem !important;
        line-height: 1.125rem !important;
        min-height: 2rem !important;
        padding: 0.4375rem 0.625rem !important;
        border-radius: 0.375rem !important;
      }
      .company-scope__option--is-focused,
      .shipto-access__option--is-focused,
      .shipto-multi__option--is-focused {
        background-color: #eef2ff !important;
      }
      .company-scope__option--is-selected,
      .shipto-access__option--is-selected,
      .shipto-multi__option--is-selected {
        background-color: #4f46e5 !important;
        color: #ffffff !important;
      }
      .company-scope__multi-value,
      .shipto-access__multi-value,
      .shipto-multi__multi-value {
        align-items: center !important;
        border-radius: 0.375rem !important;
        background-color: #eef2ff !important;
      }
      .company-scope__multi-value__label,
      .shipto-access__multi-value__label,
      .shipto-multi__multi-value__label {
        color: #4338ca !important;
        font-size: 0.75rem !important;
        font-weight: 600 !important;
        padding: 2px 6px !important;
      }
      .company-scope__multi-value__remove,
      .shipto-access__multi-value__remove,
      .shipto-multi__multi-value__remove {
        padding: 2px 4px !important;
        color: #6366f1 !important;
      }
      .company-scope__multi-value__remove:hover,
      .shipto-access__multi-value__remove:hover,
      .shipto-multi__multi-value__remove:hover {
        background-color: #c7d2fe !important;
        color: #312e81 !important;
      }

      .dark .company-scope__control,
      .dark .shipto-access__control,
      .dark .shipto-multi__control {
        background-color: #0f172a !important;
        border-color: #334155 !important;
      }
      .dark .company-scope__single-value,
      .dark .shipto-access__single-value,
      .dark .shipto-multi__single-value,
      .dark .company-scope__input-container,
      .dark .shipto-access__input-container,
      .dark .shipto-multi__input-container,
      .dark .company-scope__placeholder,
      .dark .shipto-access__placeholder,
      .dark .shipto-multi__placeholder {
        color: #cbd5e1 !important;
      }
      .dark .company-scope__menu,
      .dark .shipto-access__menu,
      .dark .shipto-multi__menu {
        background-color: #0f172a !important;
        border-color: #334155 !important;
      }
      .dark .company-scope__option,
      .dark .shipto-access__option,
      .dark .shipto-multi__option {
        background-color: #0f172a !important;
        color: #e2e8f0 !important;
      }
      .dark .company-scope__option--is-focused,
      .dark .shipto-access__option--is-focused,
      .dark .shipto-multi__option--is-focused {
        background-color: #1e293b !important;
      }
      .dark .company-scope__option--is-selected,
      .dark .shipto-access__option--is-selected,
      .dark .shipto-multi__option--is-selected {
        background-color: #3730a3 !important;
      }
      .dark .company-scope__multi-value,
      .dark .shipto-access__multi-value,
      .dark .shipto-multi__multi-value {
        background-color: #1e293b !important;
      }
      .dark .company-scope__multi-value__label,
      .dark .shipto-access__multi-value__label,
      .dark .shipto-multi__multi-value__label {
        color: #cbd5e1 !important;
      }
      .dark .company-scope__multi-value__remove,
      .dark .shipto-access__multi-value__remove,
      .dark .shipto-multi__multi-value__remove {
        color: #cbd5e1 !important;
      }
      .dark .company-scope__multi-value__remove:hover,
      .dark .shipto-access__multi-value__remove:hover,
      .dark .shipto-multi__multi-value__remove:hover {
        background-color: #334155 !important;
        color: #f8fafc !important;
      }
      .dark .company-scope__indicator-separator,
      .dark .shipto-access__indicator-separator,
      .dark .shipto-multi__indicator-separator {
        background-color: #334155 !important;
      }
      .dark .company-scope__dropdown-indicator,
      .dark .shipto-access__dropdown-indicator,
      .dark .shipto-multi__dropdown-indicator,
      .dark .company-scope__clear-indicator,
      .dark .shipto-access__clear-indicator,
      .dark .shipto-multi__clear-indicator {
        color: #94a3b8 !important;
      }
      .dark .company-scope__dropdown-indicator:hover,
      .dark .shipto-access__dropdown-indicator:hover,
      .dark .shipto-multi__dropdown-indicator:hover,
      .dark .company-scope__clear-indicator:hover,
      .dark .shipto-access__clear-indicator:hover,
      .dark .shipto-multi__clear-indicator:hover {
        color: #e2e8f0 !important;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react-dom": "https://esm.sh/react-dom@19.0.0",
          "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
          "react-router-dom": "https://esm.sh/react-router-dom@7.1.3?external=react,react-dom",
          "lucide-react": "https://esm.sh/lucide-react@0.463.0?external=react",
          "zustand": "https://esm.sh/zustand@5.0.2?external=react",
          "zustand/middleware": "https://esm.sh/zustand@5.0.2/middleware?external=react",
          "react-hook-form": "https://esm.sh/react-hook-form@7.54.1?external=react",
          "zod": "https://esm.sh/zod@3.24.1",
          "@hookform/resolvers/zod": "https://esm.sh/@hookform/resolvers@3.9.1/zod?external=react,react-hook-form",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "react/": "https://esm.sh/react@^19.2.4/",
          "zustand/": "https://esm.sh/zustand@^5.0.11/",
          "@hookform/resolvers/": "https://esm.sh/@hookform/resolvers@^5.2.2/"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="antialiased transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
