<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Web Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "#4f46e5",
                foreground: "#ffffff",
              },
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          --background: 0 0% 100%;
          --foreground: 222.2 84% 4.9%;
          --border: 214.3 31.8% 91.4%;
          --input: 214.3 31.8% 91.4%;
          --ring: 221.2 83.2% 53.3%;
        }
        .dark {
          --background: 222.2 84% 4.9%;
          --foreground: 210 40% 98%;
          --border: 217.2 32.6% 17.5%;
          --input: 217.2 32.6% 17.5%;
          --ring: 224.3 76.3% 48%;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-size: 0.875rem; /* 14px base */
            line-height: 1.25rem;
        }
        .shadcn-input {
            display: flex;
            height: 2.25rem;
            width: 100%;
            border-radius: 0.375rem;
            border: 1px solid hsl(var(--border));
            background-color: transparent;
            padding: 0 0.75rem;
            font-size: 0.875rem;
            transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shadcn-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
        }
        .dark .shadcn-input {
            background-color: #0f172a;
        }

        /* Modern Table Styles */
        .modern-table {
          width: 100%;
          border-collapse: collapse;
        }
        .modern-table thead tr {
          @apply bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800;
        }
        .modern-table th {
          @apply text-xs font-semibold text-slate-700 dark:text-slate-300 uppercase tracking-wide px-4 py-3 text-left whitespace-nowrap;
        }
        .modern-table td {
          @apply text-sm text-slate-900 dark:text-slate-100 px-4 py-2.5 border-b border-slate-100 dark:border-slate-800 transition-colors;
        }
        .modern-table tr:hover td {
          @apply bg-slate-50/50 dark:bg-slate-800/50;
        }

        /* Compact mode for complex tables */
        .modern-table-compact th { @apply px-3 py-2 text-[11px]; }
        .modern-table-compact td { @apply px-3 py-1.5 text-xs; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #1e293b; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            min-width: 80px;
            justify-content: center;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@7.1.3?external=react,react-dom",
    "lucide-react": "https://esm.sh/lucide-react@0.463.0?external=react",
    "zustand": "https://esm.sh/zustand@5.0.2?external=react",
    "zustand/middleware": "https://esm.sh/zustand@5.0.2/middleware?external=react",
    "react-hook-form": "https://esm.sh/react-hook-form@7.54.1?external=react",
    "zod": "https://esm.sh/zod@3.24.1",
    "@hookform/resolvers/zod": "https://esm.sh/@hookform/resolvers@3.9.1/zod?external=react,react-hook-form",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "zustand/": "https://esm.sh/zustand@^5.0.11/",
    "@hookform/resolvers/": "https://esm.sh/@hookform/resolvers@^5.2.2/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
